name: Build TaskGoalTracker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v1.*.*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v1.0.2"
          fi
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          PATCH=$((PATCH + 1))
          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

  build-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller and Pillow
        run: pip install pyinstaller pillow

      - name: Convert .icns to .ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('app.icns')
          img.save('app.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          "

      - name: Build .exe
        run: python -m PyInstaller --onefile --windowed --name "TaskGoalTracker" --icon=app.ico app.py

      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.version }}
          name: ${{ needs.release.outputs.version }}
          files: dist/TaskGoalTracker.exe

  build-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .app
        run: python3 -m PyInstaller --windowed --name "TaskGoalTracker" --icon=app.icns app.py

      - name: Create .dmg
        run: |
          hdiutil create -volname "TaskGoalTracker" \
            -srcfolder dist/TaskGoalTracker.app \
            -ov -format UDZO \
            dist/TaskGoalTracker.dmg

      - name: Upload .dmg to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.version }}
          name: ${{ needs.release.outputs.version }}
          files: dist/TaskGoalTracker.dmg
